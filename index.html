<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zalo Bot Chửi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #0a0a0a; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
        .container { background: #1a1a2e; max-width: 480px; width: 100%; border-radius: 24px; padding: 28px 24px; border: 1px solid #2a2a4a; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .logo { text-align: center; margin-bottom: 16px; }
        .logo h1 { color: #00d4ff; font-size: 24px; font-weight: 700; }
        .logo h1 span { color: #ff6b6b; }
        .logo p { color: #8888aa; font-size: 13px; margin-top: 4px; }
        
        .chat-box { background: #0d0d1a; border-radius: 16px; border: 1px solid #2a2a4a; height: 420px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; margin-bottom: 12px; }
        .chat-box .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; margin-bottom: 8px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .chat-box .msg.user { background: #00d4ff22; color: #00d4ff; border: 1px solid #00d4ff44; align-self: flex-end; }
        .chat-box .msg.bot { background: #0d0d1a; color: #e8e8f0; border: 1px solid #2a2a4a; align-self: flex-start; }
        .chat-box .msg .time { font-size: 10px; color: #666688; display: block; margin-top: 4px; }
        .chat-box .msg .voice { color: #ff9500; font-weight: bold; }
        
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid #333355; background: #0a0a12; color: #e8e8f0; font-size: 15px; outline: none; }
        .input-area input:focus { border-color: #00d4ff; box-shadow: 0 0 0 3px #00d4ff22; }
        .input-area button { padding: 12px 20px; border-radius: 12px; border: none; background: linear-gradient(135deg, #00d4ff, #0070ff); color: white; font-weight: 600; cursor: pointer; font-size: 15px; }
        .input-area button:active { transform: scale(0.95); }
        
        .status { color: #8888aa; font-size: 12px; text-align: center; margin-top: 10px; }
        .status .online { color: #34c759; }
        .status .offline { color: #ff4466; }
        
        .btn-reset { width: 100%; padding: 10px; margin-top: 8px; border-radius: 12px; border: none; background: #333355; color: #e8e8f0; cursor: pointer; font-size: 14px; }
        .btn-reset:active { transform: scale(0.97); }
        
        .footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid #1a1a2e; }
        .footer .warning { color: #666688; font-size: 11px; text-align: center; line-height: 1.6; }
        .footer .warning strong { color: #ff6b6b; }
        
        @media (max-width: 400px) { .container { padding: 20px 16px; } .chat-box { height: 350px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>💬 Zalo <span>Bot</span></h1>
        <p>Nói chuyện như 2 người bạn · Biết chửi · Biết hỏi lại</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg bot">
            👋 ủa mày!<br>
            Tao là bot Zalo đây.<br>
            Nói chuyện với tao đi, nhưng đừng có hỏi ngu nhé 😏
            <span class="time">Vừa xong</span>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Gửi</button>
    </div>

    <div class="status">
        <span class="online">●</span> Đang hoạt động · Bot đã sẵn sàng
    </div>

    <button class="btn-reset" onclick="resetChat()">🗑️ Xóa lịch sử chat</button>

    <div class="footer">
        <div class="warning">
            ⚠️ Bot này <strong>chửi</strong> và <strong>nói lấc cấc</strong> như bạn bè<br>
            📌 Đừng hỏi mấy câu ngớ ngẩn kẻo bị chửi
        </div>
    </div>
</div>

<script>
// ============================================================
// BOT ZALO - NÓI CHUYỆN NHƯ 2 NGƯỜI BẠN
// ============================================================

const chatBox = document.getElementById('chatBox');
const msgInput = document.getElementById('msgInput');

// Lịch sử chat
let chatHistory = [];
let msgCount = 0;

// Các câu trả lời lấc cấc
const casualReplies = [
    "ủa mày nói cái gì thế? tao nghe không rõ",
    "đm mày nói lại xem nào",
    "hả? mày nói gì cơ?",
    "à à hiểu rồi, nhưng mà... mày nói làm gì?",
    "ừ ừ, rồi sao nữa?",
    "xong chưa? kể tiếp đi",
    "vậy á? hay đấy nhưng tao chả quan tâm",
    "mày bị gì thế? nói năng lạ vậy?",
    "tao hiểu mày đang nói gì đâu, giải thích lại đi",
    "ủa mày nói thiệt hả?",
    "đù, mày đùa tao à?",
    "thế cơ à? thế mới lạ",
    "mày nói gì tao cũng tin hết, tại tao lười cãi",
    "ừ, mày nói đúng, nhưng tao vẫn chả quan tâm",
    "ok ok mày thắng rồi, im đi"
];

const angryReplies = [
    "tịnh tâm",
    "đcmm",
    "thằng bố mày",
    "war tý luôn",
    "tao là bot mày làm gì được tao",
    "lêu lêu",
    "chửi cái cc",
    "bình tĩnh",
    "im lặng nào cô anh thích nói nhiều đâu",
    "mày bị ngu à",
    "ngu",
    "tao đéo hiểu",
    "mày bị tật não à"
];

const voiceReplies = [
    "🎤 HỎI ÍT THÔI MÁ",
    "🎤 ĐÃ BẢO RỒI MÀ",
    "🎤 MÀY ĐIẾC À",
    "🎤 IM ĐI"
];

const questionReplies = [
    "ủa, hỏi làm gì thế?",
    "mày hỏi để làm gì?",
    "hỏi vậy rồi để làm gì?",
    "mày thắc mắc à? để tao nói cho",
    "câu hỏi hay đấy, nhưng tao chả biết trả lời",
    "hỏi tao á? tao còn đang hỏi mày đấy",
    "mày hỏi nhiều quá rồi đó",
    "hỏi gì mà hỏi hoài vậy?"
];

const greetingReplies = [
    "chào mày, có gì mới không?",
    "ồ mày đấy à, lâu quá không gặp",
    "hello thằng điên, lại đây chơi",
    "chào, hôm nay thế nào?",
    "đm mày hôm nay trông khác nhỉ",
    "chào má, lại gặp nhau rồi",
    "hello, tao đây, có gì không?",
    "lâu lâu mới thấy mày ló mặt"
];

const funnyReplies = [
    "mày làm tao cười vãi",
    "đù má, vui thế",
    "hài vl, kể tiếp đi",
    "mày có tài nói chuyện đấy",
    "cười chết mất",
    "mày mà đi làm hài chắc giàu to",
    "đúng là đồ điên"
];

const insultReplies = [
    "mày bị ngu à",
    "ngu vãi",
    "mày bị tật não à",
    "đm ngu thế",
    "mày có hiểu gì không?",
    "trời ơi, ngu quá",
    "mày ngu thật đấy",
    "thôi đi, não mày để đâu?"
];

// Hàm thêm tin nhắn
function addMsg(text, sender) {
    const time = new Date().toLocaleTimeString('vi-VN');
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.innerHTML = `${text}<span class="time">${time}</span>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    chatHistory.push({ text, sender, time });
}

// Hàm xóa chat
function resetChat() {
    chatBox.innerHTML = '';
    chatHistory = [];
    msgCount = 0;
    addMsg('👋 Đã xóa chat. Nói chuyện tiếp đi!', 'bot');
}

// Hàm bot trả lời
function botReply(userMsg) {
    const lower = userMsg.toLowerCase();
    const isVulgar = /(địt|đmm|đm|cl|cc|cặc|lồn|đéo|đĩ|mẹ|chó|ngu|khốn|chết|giết|fuck|shit|đjt|dm|clgt|đụ|địt|đái|cứt|ỉa|ị|chịch|địt|đụ|chửi|óc|chó|heo|bò|đần|thối)/i.test(userMsg);
    const isQuestion = /(ai|gì|đâu|nào|sao|thế nào|tại sao|bao nhiêu|mấy|không|chưa|hả|nhỉ|à|ư|hở|có phải|phải không)/i.test(userMsg) && userMsg.length > 3;
    const isGreeting = /(chào|hello|hi|xin chào|hey|ô|ơi|alô|alo)/i.test(userMsg);
    const isFunny = /(haha|hihi|hehe|hêhê|hố hố|hí hí|vui|cười|hài|bựa|troll|đùa)/i.test(userMsg);
    const isShort = userMsg.length < 4;
    const isTooLong = userMsg.length > 80;
    const isNonsense = /(abc|xyz|123|qwerty|asdf|zxcv|test|testing|meme|baby|love|hate|fuck|dumb|stupid|idiot|gà|chó|mèo|heo|bò|vịt|gà|thỏ|ăn|cứt|đái)/i.test(userMsg) && userMsg.length < 6;
    
    let reply = '';
    const random = Math.random();
    
    // Đếm số lần hỏi
    if (isQuestion) {
        msgCount++;
    } else {
        msgCount = 0;
    }
    
    // Nếu chửi tục -> chửi lại
    if (isVulgar) {
        reply = angryReplies[Math.floor(Math.random() * angryReplies.length)];
    }
    // Nếu hỏi quá 3 lần liên tiếp -> voice
    else if (msgCount >= 3) {
        reply = voiceReplies[Math.floor(Math.random() * voiceReplies.length)];
        msgCount = 0;
    }
    // Nếu tin nhắn quá ngắn -> chửi
    else if (isShort) {
        reply = insultReplies[Math.floor(Math.random() * insultReplies.length)];
    }
    // Nếu tin nhắn quá dài -> chửi
    else if (isTooLong) {
        reply = "mày viết dài vãi, tao lười đọc, tóm lại đi";
    }
    // Nếu câu hỏi ngớ ngẩn
    else if (isNonsense) {
        reply = insultReplies[Math.floor(Math.random() * insultReplies.length)];
    }
    // Nếu là lời chào
    else if (isGreeting) {
        reply = greetingReplies[Math.floor(Math.random() * greetingReplies.length)];
    }
    // Nếu là câu đùa/hài
    else if (isFunny) {
        reply = funnyReplies[Math.floor(Math.random() * funnyReplies.length)];
    }
    // Nếu là câu hỏi
    else if (isQuestion) {
        if (random < 0.4) {
            reply = questionReplies[Math.floor(Math.random() * questionReplies.length)];
        } else if (random < 0.7) {
            reply = casualReplies[Math.floor(Math.random() * casualReplies.length)];
        } else {
            reply = "mày hỏi tao, tao hỏi lại mày, mày trả lời đi rồi tao nói";
        }
    }
    // Nếu tin nhắn có từ "không", "chưa"
    else if (/(không|chưa|đéo|chẳng|chả)/i.test(userMsg)) {
        reply = "ừ không thì thôi, hỏi làm gì";
    }
    // Nếu tin nhắn có từ "thích", "yêu", "ghét"
    else if (/(thích|yêu|ghét|thương|nhớ)/i.test(userMsg)) {
        reply = "chuyện tình cảm à? tao không quan tâm đâu";
    }
    // Nếu tin nhắn có từ "ăn", "uống", "ngủ"
    else if (/(ăn|uống|ngủ|chơi|đi|về)/i.test(userMsg)) {
        reply = "đi chơi đi, đừng làm phiền tao";
    }
    // Nếu tin nhắn có từ "tiền", "lương", "giá"
    else if (/(tiền|lương|giá|bao nhiêu|mua|bán)/i.test(userMsg)) {
        reply = "tao không có tiền, đừng hỏi xin tao";
    }
    // Mặc định
    else {
        const allReplies = [...casualReplies, ...funnyReplies, ...questionReplies];
        reply = allReplies[Math.floor(Math.random() * allReplies.length)];
    }
    
    // Đôi khi hỏi lại người dùng
    if (Math.random() < 0.15 && !isQuestion) {
        const followUp = [
            "còn mày thì sao?",
            "mày nghĩ gì về điều đó?",
            "mày có đồng ý không?",
            "mày hiểu tao nói gì không?",
            "mày thấy thế nào?",
            "mày có muốn nói gì không?"
        ];
        reply += " " + followUp[Math.floor(Math.random() * followUp.length)];
    }
    
    return reply;
}

// Gửi tin nhắn
function sendMsg() {
    const msg = msgInput.value.trim();
    if (!msg) return;
    
    addMsg(msg, 'user');
    msgInput.value = '';
    
    // Bot trả lời sau 400-800ms
    const delay = 400 + Math.random() * 400;
    setTimeout(() => {
        const reply = botReply(msg);
        addMsg(reply, 'bot');
    }, delay);
}

// Bắt phím Enter
document.getElementById('msgInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        sendMsg();
    }
});

// Focus vào input
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('msgInput').focus();
});
</script>
</body>
</html>
